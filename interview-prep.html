<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep — Pixels & Pines</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --forest: #2d4a2d;
      --sand:   #e8dcc8;
      --foam:   #f4f1eb;
      --dark:   #1a1a1a;
    }
    body {
      font-family: 'Georgia', serif;
      background: var(--foam);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }
    nav {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
    }
    nav a {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--forest);
      text-decoration: none;
      border-bottom: 1px solid var(--forest);
      padding-bottom: 2px;
    }
    nav a:hover { opacity: 0.6; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--forest);
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #555;
      max-width: 480px;
    }
    .badge {
      margin-top: 2rem;
      display: inline-block;
      background: var(--sand);
      color: var(--forest);
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <nav><a href="index.html">← Back</a></nav>
  <div class="icon">🃏</div>
  <h1>Interview Prep</h1>
  <p>Flashcards and resources for interview preparation — coming soon.</p>
  <!-- TODO: Add flashcard components here -->
  <span class="badge">Under Construction</span>
</body>
</html>
